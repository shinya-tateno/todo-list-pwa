<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ちゃいろのTODO</title>
  
  <!-- PWA設定 -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#4caf50">
  
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
      background-color: #f5f5f5;
    }
    iframe {
      border: none;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <!-- ここに君のStreamlitアプリのURLを入れる -->
  <iframe 
    src="https://shinya-todo-list.streamlit.app" 
    allowfullscreen>
  </iframe>

  <script>
    // Service Worker登録
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js')
        .then(() => console.log('Service Worker登録完了'))
        .catch(err => console.log('Service Worker登録失敗', err));
    }
  </script>
</body>
</html>
